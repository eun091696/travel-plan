spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:travelplan;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
